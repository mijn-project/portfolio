<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII.VIDEO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;600;700&display=swap');

  :root {
    --bg: #050505;
    --gold1: #FFD700;
    --gold2: #FFA500;
    --gold3: #B8860B;
    --gold-glow: rgba(255,215,0,0.35);
    --gold-dim: rgba(255,180,0,0.12);
    --surface: rgba(20,16,5,0.85);
    --border: rgba(255,200,50,0.18);
    --text: #f5e6c0;
    --muted: #7a6a3a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,180,0,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 90%, rgba(255,140,0,0.05) 0%, transparent 60%);
  }

  /* floating particles bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,215,0,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,180,0,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,215,0,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 20%, rgba(255,160,0,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,200,0,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
    animation: shimmer 8s ease-in-out infinite alternate;
  }

  @keyframes shimmer {
    from { opacity: 0.5; transform: translateY(0px); }
    to   { opacity: 1;   transform: translateY(-6px); }
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(5,4,1,0.9);
    backdrop-filter: blur(20px);
    z-index: 100;
    box-shadow: 0 1px 40px rgba(255,180,0,0.08);
  }

  .logo {
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--gold1) 0%, var(--gold2) 50%, var(--gold3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.5));
  }

  .logo-dot {
    -webkit-text-fill-color: var(--muted);
    color: var(--muted);
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    filter: none;
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* CONTAINER */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 20px 0 48px;
    animation: floatUp 0.8s ease both;
  }

  @keyframes floatUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-title {
    font-family: var(--mono);
    font-size: clamp(36px, 7vw, 80px);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff8e0 0%, var(--gold1) 40%, var(--gold2) 70%, var(--gold3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,200,0,0.4));
  }

  .hero-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 3px;
  }

  /* GLASS CARD */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 1px 0 rgba(255,215,0,0.15) inset,
      0 0 60px rgba(255,180,0,0.04);
    animation: floatCard 6s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }

  .glass::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent);
    pointer-events: none;
  }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 1px 0 rgba(255,215,0,0.15) inset, 0 0 60px rgba(255,180,0,0.04); }
    50%       { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 1px 0 rgba(255,215,0,0.2) inset, 0 0 80px rgba(255,180,0,0.07); }
  }

  /* UPLOAD ZONE */
  .upload-zone {
    padding: 64px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    background: rgba(255,200,0,0.04);
  }

  .upload-zone:hover .upload-ring {
    border-color: var(--gold1);
    box-shadow: 0 0 30px rgba(255,215,0,0.3);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
    transition: all 0.3s;
    background: rgba(255,180,0,0.05);
  }

  .upload-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--gold1), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .upload-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 1px;
  }

  /* CONTROLS */
  .controls-wrap {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 9px 18px;
    border: 1px solid var(--border);
    background: rgba(255,180,0,0.05);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    border-radius: 8px;
  }

  .btn:hover {
    border-color: var(--gold2);
    color: var(--gold1);
    background: rgba(255,180,0,0.1);
    box-shadow: 0 0 16px rgba(255,180,0,0.15);
  }

  .btn.active {
    border-color: var(--gold1);
    color: #000;
    background: linear-gradient(135deg, var(--gold1), var(--gold2));
    box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 2px 8px rgba(0,0,0,0.4);
    font-weight: 700;
  }

  .btn.primary {
    border-color: var(--gold1);
    color: #000;
    background: linear-gradient(135deg, var(--gold1) 0%, var(--gold2) 100%);
    font-weight: 700;
    box-shadow: 0 0 24px rgba(255,200,0,0.35), 0 4px 12px rgba(0,0,0,0.4);
  }

  .btn.primary:hover {
    box-shadow: 0 0 36px rgba(255,200,0,0.5), 0 4px 16px rgba(0,0,0,0.5);
    transform: translateY(-1px);
  }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .mode-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .mode-group .btn {
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--border);
  }

  .mode-group .btn:last-child { border-right: none; }

  .sep {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 2px;
    flex-shrink: 0;
  }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 70px;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold1), var(--gold2));
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,200,0,0.5);
  }

  /* OUTPUT */
  .output-wrap {
    position: relative;
    background: #000;
    overflow: hidden;
    border-radius: 0 0 16px 16px;
  }

  #ascii-canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: rgba(10,8,2,0.9);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.live {
    background: var(--gold1);
    box-shadow: 0 0 8px rgba(255,215,0,0.7);
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
  }

  /* PROGRESS */
  .progress-wrap {
    height: 2px;
    background: rgba(255,180,0,0.1);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold3), var(--gold1));
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(255,200,0,0.6);
  }

  /* EXPORT BAR */
  .export-bar {
    display: flex;
    gap: 10px;
    padding: 16px 20px 0;
    flex-wrap: wrap;
  }

  /* PLAYER SECTION */
  .player-section { display: none; }
  .player-section.visible { display: block; }

  /* HIDDEN */
  #hidden-video {
    position: fixed; top: -9999px; left: -9999px;
    opacity: 0; pointer-events: none;
    width: 320px; height: 240px;
  }
  #hidden-canvas { display: none; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .container { padding: 16px 12px; }
    .controls-wrap { gap: 6px; padding: 12px; }
    .btn { padding: 7px 12px; font-size: 10px; }
    .slider-wrap { font-size: 9px; }
    input[type=range] { width: 50px; }
  }

  /* 3D BG CANVAS */
  #bg3d {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  /* SOCIAL BUTTONS */
  .socials {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,180,0,0.06);
    color: var(--muted);
    text-decoration: none;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,215,0,0.15), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .social-btn:hover {
    border-color: var(--gold1);
    color: var(--gold1);
    box-shadow: 0 0 16px rgba(255,215,0,0.3), 0 0 4px rgba(255,215,0,0.2) inset;
    transform: translateY(-2px);
  }

  .social-btn:hover::before { opacity: 1; }

  .social-btn svg {
    width: 17px;
    height: 17px;
    position: relative;
    z-index: 1;
  }
</style>

<script>
const CHARS = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/*tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
const CHAR_FONT_SIZE = 7;
const CHAR_W = 4.3;
const CHAR_H = 7.7;

// Sprite sheet — pre-render all chars once, white on black
const sprite = document.createElement('canvas');
const sCtx   = sprite.getContext('2d');
sprite.width  = Math.ceil(CHAR_W) * CHARS.length;
sprite.height = Math.ceil(CHAR_H);
sCtx.fillStyle = '#000';
sCtx.fillRect(0, 0, sprite.width, sprite.height);
sCtx.fillStyle = '#fff';
sCtx.font = `${CHAR_FONT_SIZE}px 'Share Tech Mono', monospace`;
sCtx.textBaseline = 'top';
for (let i = 0; i < CHARS.length; i++) sCtx.fillText(CHARS[i], i * CHAR_W, 0);

// State
let mode        = 'gold';
let isPlaying   = false;
let animFrame   = null;
let lastTime    = 0;
let targetFPS   = 15;
let asciiWidth  = 100;
let lastText    = '';

const video     = document.getElementById('hidden-video');
const srcCanvas = document.getElementById('hidden-canvas');
const srcCtx    = srcCanvas.getContext('2d', { willReadFrequently: true });
const outCanvas = document.getElementById('ascii-canvas');
const outCtx    = outCanvas.getContext('2d');

// Upload
const fileInput  = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadVideo(e.target.files[0]); });

document.getElementById('change-video-btn').addEventListener('click', () => {
  stopPlayback();
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('upload-card').style.display = 'block';
  document.getElementById('hero-section').style.display = 'block';
  fileInput.value = '';
});

function loadVideo(file) {
  const url = URL.createObjectURL(file);
  video.src = url;
  // NOTE: no 'muted' attribute — audio plays
  video.load();
  video.addEventListener('loadedmetadata', () => {
    document.getElementById('upload-card').style.display = 'none';
    document.getElementById('hero-section').style.display = 'none';
    document.getElementById('player-section').classList.add('visible');
    setStatus('READY', false);
    renderFrame();
  }, { once: true });
}

// Playback
document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) pausePlayback(); else startPlayback();
});
document.getElementById('stop-btn').addEventListener('click', stopPlayback);

function startPlayback() {
  isPlaying = true;
  video.play();
  document.getElementById('play-btn').textContent = '⏸ PAUSE';
  setStatus('PLAYING', true);
  lastTime = performance.now();
  animFrame = requestAnimationFrame(loop);
}

function pausePlayback() {
  isPlaying = false;
  video.pause();
  document.getElementById('play-btn').textContent = '▶ PLAY';
  setStatus('PAUSED', false);
  if (animFrame) cancelAnimationFrame(animFrame);
}

function stopPlayback() {
  isPlaying = false;
  video.pause();
  video.currentTime = 0;
  document.getElementById('play-btn').textContent = '▶ PLAY';
  setStatus('STOPPED', false);
  if (animFrame) cancelAnimationFrame(animFrame);
  renderFrame();
}

function loop(ts) {
  if (!isPlaying) return;
  if (ts - lastTime >= 1000 / targetFPS) {
    renderFrame();
    lastTime = ts;
    if (video.duration) {
      document.getElementById('progress-fill').style.width =
        (video.currentTime / video.duration * 100) + '%';
    }
  }
  animFrame = requestAnimationFrame(loop);
}

video.addEventListener('ended', () => {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶ PLAY';
  setStatus('ENDED', false);
  if (animFrame) cancelAnimationFrame(animFrame);
});

// Render
function renderFrame() {
  const cols   = asciiWidth;
  const aspect = video.videoHeight / video.videoWidth || 9/16;
  const rows   = Math.max(1, Math.floor(cols * aspect * 0.45));

  srcCanvas.width  = cols;
  srcCanvas.height = rows;
  srcCtx.drawImage(video, 0, 0, cols, rows);
  const { data } = srcCtx.getImageData(0, 0, cols, rows);

  const cw = Math.ceil(cols * CHAR_W);
  const ch = Math.ceil(rows * CHAR_H);
  outCanvas.width  = cw;
  outCanvas.height = ch;

  // Build char index + text
  const idx  = new Uint8Array(cols * rows);
  const rows_ = [];
  for (let y = 0; y < rows; y++) {
    let row = '';
    for (let x = 0; x < cols; x++) {
      const i   = (y * cols + x) * 4;
      const lum = (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) / 255;
      const ci  = Math.min(CHARS.length-1, Math.floor(lum * CHARS.length));
      idx[y*cols+x] = ci;
      row += CHARS[ci];
    }
    rows_.push(row);
  }
  lastText = rows_.join('\n');

  // Draw white chars from sprite
  outCtx.fillStyle = '#000';
  outCtx.fillRect(0, 0, cw, ch);
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const ci = idx[y*cols+x];
      if (ci === 0) continue;
      outCtx.drawImage(sprite,
        ci * CHAR_W, 0, CHAR_W, CHAR_H,
        x  * CHAR_W, y * CHAR_H, CHAR_W, CHAR_H);
    }
  }

  // Colorize
  if (mode === 'color') {
    const tc   = new OffscreenCanvas(cols, rows);
    const tCtx = tc.getContext('2d');
    const td   = tCtx.createImageData(cols, rows);
    for (let i = 0; i < cols*rows; i++) {
      td.data[i*4]   = data[i*4];
      td.data[i*4+1] = data[i*4+1];
      td.data[i*4+2] = data[i*4+2];
      td.data[i*4+3] = 255;
    }
    tCtx.putImageData(td, 0, 0);
    outCtx.globalCompositeOperation = 'multiply';
    outCtx.drawImage(tc, 0, 0, cw, ch);
    outCtx.globalCompositeOperation = 'source-over';

  } else if (mode === 'gold') {
    // Gold gradient tint
    const grad = outCtx.createLinearGradient(0, 0, cw, ch);
    grad.addColorStop(0,   '#fff8c0');
    grad.addColorStop(0.3, '#FFD700');
    grad.addColorStop(0.6, '#FFA500');
    grad.addColorStop(1,   '#B8860B');
    outCtx.globalCompositeOperation = 'multiply';
    outCtx.fillStyle = grad;
    outCtx.fillRect(0, 0, cw, ch);
    outCtx.globalCompositeOperation = 'source-over';

  } else {
    // White — no tint needed, chars are already white
  }

  document.getElementById('frame-info').textContent =
    `${cols}×${rows} | ${Math.floor(video.currentTime)}s`;
}

// Mode buttons
function setMode(m) {
  mode = m;
  ['gold','color','white'].forEach(id => {
    document.getElementById('mode-'+id).classList.toggle('active', id === m);
  });
  if (!isPlaying) renderFrame();
}

// Sliders
document.getElementById('detail-slider').addEventListener('input', function() {
  asciiWidth = parseInt(this.value);
  document.getElementById('detail-val').textContent = this.value;
  if (!isPlaying) renderFrame();
});
document.getElementById('fps-slider').addEventListener('input', function() {
  targetFPS = parseInt(this.value);
  document.getElementById('fps-val').textContent = this.value;
});

function setStatus(text, live) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').classList.toggle('live', live);
}

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lastText], {type:'text/plain'}));
  a.download = 'ascii-frame.txt';
  a.click();
});
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(lastText).then(() => {
    const b = document.getElementById('copy-btn');
    b.textContent = '✓ COPIED';
    setTimeout(() => b.textContent = '⎘ COPY FRAME', 1500);
  });
});
</script>

<script>
// ─── THREE.JS GOLD 3D BACKGROUND ─────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg3d');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.z = 50;

  // Gold colors
  const goldColors = [0xFFD700, 0xFFA500, 0xDAA520, 0xFFEC8B, 0xB8860B];

  // ── Floating spheres ──────────────────────────────────────────────────────
  const spheres = [];
  const sphereGeo = new THREE.SphereGeometry(1, 16, 16);
  for (let i = 0; i < 22; i++) {
    const mat = new THREE.MeshStandardMaterial({
      color: goldColors[i % goldColors.length],
      metalness: 1.0,
      roughness: 0.15,
      envMapIntensity: 1.5,
    });
    const mesh = new THREE.Mesh(sphereGeo, mat);
    const scale = 0.3 + Math.random() * 1.8;
    mesh.scale.setScalar(scale);
    mesh.position.set(
      (Math.random() - 0.5) * 100,
      (Math.random() - 0.5) * 80,
      (Math.random() - 0.5) * 40 - 10
    );
    mesh.userData = {
      speed: 0.003 + Math.random() * 0.006,
      rotSpeed: (Math.random() - 0.5) * 0.01,
      floatAmp: 1 + Math.random() * 3,
      floatOffset: Math.random() * Math.PI * 2,
      driftX: (Math.random() - 0.5) * 0.004,
      driftY: (Math.random() - 0.5) * 0.004,
    };
    scene.add(mesh);
    spheres.push(mesh);
  }

  // ── Floating rings ────────────────────────────────────────────────────────
  const rings = [];
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.TorusGeometry(1.5 + Math.random() * 2, 0.06 + Math.random() * 0.1, 12, 60);
    const mat = new THREE.MeshStandardMaterial({
      color: goldColors[i % goldColors.length],
      metalness: 1.0,
      roughness: 0.1,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 90,
      (Math.random() - 0.5) * 70,
      (Math.random() - 0.5) * 30 - 5
    );
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    mesh.userData = {
      rotX: (Math.random() - 0.5) * 0.008,
      rotY: (Math.random() - 0.5) * 0.008,
      floatAmp: 0.5 + Math.random() * 2,
      floatOffset: Math.random() * Math.PI * 2,
      speed: 0.004 + Math.random() * 0.004,
    };
    scene.add(mesh);
    rings.push(mesh);
  }

  // ── Gold dust particles ───────────────────────────────────────────────────
  const PARTICLE_COUNT = 300;
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const pColors   = new Float32Array(PARTICLE_COUNT * 3);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i*3]   = (Math.random() - 0.5) * 120;
    positions[i*3+1] = (Math.random() - 0.5) * 100;
    positions[i*3+2] = (Math.random() - 0.5) * 60;
    const c = new THREE.Color(goldColors[Math.floor(Math.random() * goldColors.length)]);
    pColors[i*3] = c.r; pColors[i*3+1] = c.g; pColors[i*3+2] = c.b;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pGeo.setAttribute('color',    new THREE.BufferAttribute(pColors,   3));
  const pMat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(pGeo, pMat));

  // ── Lighting ──────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffd700, 0.4));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(20, 30, 20);
  scene.add(dirLight);
  const pointLight1 = new THREE.PointLight(0xffd700, 2, 80);
  pointLight1.position.set(-20, 20, 10);
  scene.add(pointLight1);
  const pointLight2 = new THREE.PointLight(0xffa500, 1.5, 60);
  pointLight2.position.set(30, -10, 5);
  scene.add(pointLight2);

  // ── Animate ───────────────────────────────────────────────────────────────
  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.016;

    spheres.forEach(s => {
      const u = s.userData;
      s.rotation.y += u.rotSpeed;
      s.rotation.x += u.rotSpeed * 0.5;
      s.position.y  += Math.sin(t * u.speed * 60 + u.floatOffset) * 0.015 * u.floatAmp;
      s.position.x  += u.driftX;
      s.position.y  += u.driftY;
      // wrap
      if (s.position.x >  60) s.position.x = -60;
      if (s.position.x < -60) s.position.x =  60;
      if (s.position.y >  50) s.position.y = -50;
      if (s.position.y < -50) s.position.y =  50;
    });

    rings.forEach(r => {
      const u = r.userData;
      r.rotation.x += u.rotX;
      r.rotation.y += u.rotY;
      r.position.y += Math.sin(t * u.speed * 60 + u.floatOffset) * 0.012 * u.floatAmp;
    });

    // pulse particle opacity
    pMat.opacity = 0.4 + 0.3 * Math.sin(t * 1.5);
    // slowly drift particles
    const pos = pGeo.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      pos[i*3+1] += 0.012;
      if (pos[i*3+1] > 50) pos[i*3+1] = -50;
    }
    pGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
